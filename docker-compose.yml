services:

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./shell:/usr/share/nginx/html:ro
    depends_on:
      portal-auth:
        condition: service_healthy

  portal-auth:
    build: ./portal-auth
    environment:
      ConnectionStrings__Default: "Host=postgres;Database=portal;Username=postgres;Password=${POSTGRES_PASSWORD}"
      Jwt__Key: "${JWT_KEY}"
      ASPNETCORE_URLS: "http://+:5001"
      DOTNET_HOSTBUILDER__RELOADCONFIGONCHANGE: "false"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5001' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: portal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portal"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Bullet Heaven ────────────────────────────────────────────────────────────

  bh-client:
    image: ghcr.io/alon-shviki/bh-client:latest
    ports:
      - "8080:80"
    depends_on:
      - portal-auth

volumes:
  pgdata:
