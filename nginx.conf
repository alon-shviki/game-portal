events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Recompress proxied game assets — sub_filter forces Accept-Encoding "" upstream,
    # so the games' precompressed files arrive plain and we gzip here instead.
    gzip on;
    gzip_types application/wasm application/javascript application/json text/css;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;   # games are same-origin iframes now
        add_header Referrer-Policy no-referrer always;

        # Portal auth API — strip /api/auth prefix before forwarding
        location /api/auth/ {
            proxy_pass         http://portal-auth:5001/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # Games — path-based routing. Contract: game index.html must contain the
        # literal string <base href="/" (sub_filter is an exact-string match).
        location /bh/ {
            proxy_pass         http://bh-client:80/;   # trailing slash strips /bh/
            proxy_set_header   Accept-Encoding "";     # required for sub_filter
            sub_filter         '<base href="/"' '<base href="/bh/"';
            sub_filter_once    on;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location /orbit-break/ {
            proxy_pass         http://orbit-break-client:80/;
            proxy_set_header   Accept-Encoding "";
            sub_filter         '<base href="/"' '<base href="/orbit-break/"';
            sub_filter_once    on;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # Portal shell static files
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
